<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Lights Out</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800;900&family=Bebas+Neue&family=Lilita+One&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
    }
    body {
      background: #06111e;
      touch-action: manipulation;
      -webkit-user-select: none; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Fixed design canvas: 1920 × 1080 (Figma native) ──
       Positioned top-left and centered via translate+scale in JS,
       so it fits any display size without flexbox-overflow miscentering. */
    #canvas {
      width: 1920px; height: 1080px;
      position: absolute;
      top: 0; left: 0;
      transform-origin: top left;
      background: #06111e url('assets/background.webp') center / cover no-repeat;
      overflow: hidden;
    }

    /* ── Animations ──────────────────────────────── */
    @keyframes fadeIn   { from { opacity:0; transform:translateY(6px); }  to { opacity:1; transform:translateY(0); } }
    @keyframes popIn    { from { opacity:0; transform:scale(0.45); }       to { opacity:1; transform:scale(1); } }
    @keyframes shake    { 0%,100%{transform:translateX(0);} 20%{transform:translateX(-8px);} 40%{transform:translateX(8px);} 60%{transform:translateX(-5px);} 80%{transform:translateX(5px);} }
    @keyframes hintGlow  { 0%,100%{filter:brightness(1)   drop-shadow(0 0 6px rgba(0,229,255,.5));} 50%{filter:brightness(1.15) drop-shadow(0 0 18px rgba(0,229,255,1));} }
    @keyframes pulse    { 0%,100%{filter:brightness(1);}  50%{filter:brightness(1.28) drop-shadow(0 0 18px #4afa7c);} }
    @keyframes float    { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-10px);} }

    /* ════════════════════════════════════════════
       QUESTION SCREEN — Figma layout (node 956:7170)
    ════════════════════════════════════════════ */

    /* Robot (top-left) */
    #qrobot {
      position: absolute;
      left: 55px; top: -16px;
      width: 196px; height: 257px;
      overflow: hidden;
      z-index: 5;
    }
    /* Byte dancing in the top-left (tutorial completion) */
    #byte-dance {
      position: absolute;
      left: 20px; top: -14px;
      width: 235px; height: auto;
      z-index: 6;
      display: none;
      transform-origin: center bottom;
      filter: drop-shadow(0 0 18px rgba(0,220,255,.45));
    }
    #byte-dance.show { display: block; }   /* the GIF animates itself */
    #qrobot img {
      position: absolute;
      left: -61.46%; top: -0.09%;
      width: 232.81%; height: 100.17%;
      max-width: none;
    }

    /* Bot text bar (the long top frame) */
    #bot-bar {
      position: absolute;
      left: 161px; top: 32px;
      width: 1499px; height: 150.654px;
      z-index: 4;
    }
    #bot-bar .frame {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
    }
    #bot-text {
      position: absolute;
      left: 116px; right: 40px;
      top: 48%; transform: translateY(-50%);
      font-family: 'Exo 2', sans-serif;
      font-size: 34px; font-weight: 700;
      color: #dff4f8;
      text-shadow: 0 0 10px rgba(0,200,230,.5);
      white-space: nowrap;
      text-align: left;
    }

    /* Power button (top-right) */
    #power-btn {
      position: absolute;
      left: 1695px; top: 32px;
      width: 183px; height: 178px;
      object-fit: contain;
      z-index: 2;
    }
    #power-btn.pulsing { animation: pulse 1.2s ease-in-out infinite; }

    /* Glowing pipe connectors (behind panels) */
    .connector { position: absolute; z-index: 1; pointer-events: none; }
    .cclip { position: absolute; inset: 0; overflow: hidden; }
    .cclip img { position: absolute; max-width: none; transition: filter 0.25s ease; }

    /* flowing current — a green copy of the pipe, revealed as a sharp bright bolt of light
       that zips along the tube (a lightning pass, confined to the exact pipe shape) */
    .cclip .flow {
      position: absolute;
      max-width: none;
      opacity: 0;
      pointer-events: none;
      filter: brightness(2.7) saturate(2.1) hue-rotate(-88deg);
      -webkit-mask-image: linear-gradient(90deg, transparent 0%, transparent 36%, #000 47%, #000 53%, transparent 64%, transparent 100%);
      mask-image: linear-gradient(90deg, transparent 0%, transparent 36%, #000 47%, #000 53%, transparent 64%, transparent 100%);
      -webkit-mask-size: 60% 100%; mask-size: 60% 100%;
      -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
    }
    @keyframes currentFlow {
      from { -webkit-mask-position: -60% 0; mask-position: -60% 0; }
      to   { -webkit-mask-position: 165% 0; mask-position: 165% 0; }
    }
    #screen-question.current-on .connector:not(.cn-small) .flow {
      opacity: 1;
      animation: currentFlow 1.15s linear 0.4s infinite both;   /* slower so the surge is clearly noticeable */
    }
    #screen-question.current-on .cclip img:not(.flow) { filter: brightness(1.15); }

    /* Main panel */
    #main-panel {
      position: absolute;
      left: 72px; top: 215px;
      width: 1573.948px; height: 453px;
      z-index: 3;
    }

    /* Entrance: the box appears as a bright line, then opens vertically */
    #main-panel.opening {
      animation: panelOpen 1.9s cubic-bezier(0.22, 1.04, 0.36, 1) 1.0s both;
    }
    @keyframes panelOpen {
      0%   { opacity: 0; transform: scale(0.42, 0.02);
             filter: brightness(2.3) drop-shadow(0 0 46px rgba(15,229,250,1)); }
      16%  { opacity: 1; transform: scale(1, 0.025);
             filter: brightness(2.3) drop-shadow(0 0 46px rgba(15,229,250,1)); }
      55%  { transform: scale(1, 1.05);
             filter: brightness(1.35) drop-shadow(0 0 26px rgba(15,229,250,.6)); }
      75%  { transform: scale(1, 0.985); }
      100% { opacity: 1; transform: scale(1, 1); filter: none; }
    }

    /* ── Playful one-by-one entrance for the question screen ── */
    @keyframes robotBounceIn {
      0%   { opacity: 0; transform: translateY(-52px) scale(0.4); }
      55%  { opacity: 1; transform: translateY(8px)  scale(1.12); }
      78%  {             transform: translateY(-4px) scale(0.96); }
      100% { opacity: 1; transform: translateY(0)    scale(1); }
    }
    @keyframes barExpandIn {
      0%   { opacity: 0; transform: scaleX(0.12); }
      60%  { opacity: 1; transform: scaleX(1.04); }
      100% { opacity: 1; transform: scaleX(1); }
    }
    @keyframes popBounceIn {
      0%   { opacity: 0; transform: scale(0.3)  translateY(16px); }
      55%  { opacity: 1; transform: scale(1.15) translateY(-6px); }
      78%  {             transform: scale(0.95) translateY(2px); }
      100% { opacity: 1; transform: scale(1)    translateY(0); }
    }
    @keyframes connDrawIn {
      0%   { opacity: 0; transform: scale(0.55); }
      70%  { opacity: 1; transform: scale(1.04); }
      100% { opacity: 1; transform: scale(1); }
    }
    @keyframes switchDrop {
      0%   { opacity: 0; transform: translateY(-46px) scale(0.7); }
      60%  { opacity: 1; transform: translateY(6px)   scale(1.06); }
      80%  {             transform: translateY(-2px)  scale(0.98); }
      100% { opacity: 1; transform: translateY(0)     scale(1); }
    }

    #screen-question.intro #qrobot    { animation: robotBounceIn 0.85s cubic-bezier(0.34,1.56,0.64,1) 0.15s both; transform-origin: center bottom; }
    /* bot bar appears LAST (after switches + options + vent), then types its text */
    #bot-bar.bar-hidden { opacity: 0; pointer-events: none; }
    #bot-bar.bar-reveal { animation: barExpandIn 0.6s cubic-bezier(0.34,1.4,0.64,1) both; transform-origin: left center; }
    /* blue pipe + red power button appear together, AFTER the box has fully opened (~2.9s) */
    #screen-question.intro #power-btn { animation: popBounceIn 0.78s cubic-bezier(0.34,1.56,0.64,1) 2.95s both; }
    #screen-question.intro .connector:not(.opt-pipe) { animation: connDrawIn 0.65s cubic-bezier(0.34,1.4,0.64,1) 2.95s both; }
    #panel-frame {
      position: absolute;
      left: -0.79%; top: 0;
      width: 101.58%; height: 102.76%;
      pointer-events: none;
    }
    /* Vent indicator bars — sit on top of the panel housing */
    .vent-bars { position: absolute; inset: 0; pointer-events: none; z-index: 1; }
    .vent-bar {
      position: absolute;
      border-radius: 4px;
      background: #0ce4f9;
      box-shadow: 0 0 3px rgba(12,228,249,.4), inset 0 0 3px rgba(255,255,255,.22);
      transition: background .18s ease, box-shadow .18s ease;
    }
    #main-panel.vent-correct .vent-bar {
      background: #2bff7a;
      box-shadow: 0 0 13px rgba(43,255,122,.95), inset 0 0 4px rgba(255,255,255,.4);
    }
    #main-panel.vent-wrong .vent-bar {
      background: #ffb020;
      box-shadow: 0 0 13px rgba(255,176,32,.95), inset 0 0 4px rgba(255,255,255,.4);
    }
    #main-panel.row-complete .vent-bar { display: none; }

    /* pattern complete: a bright green pulse flows through the vent bars (left → right, toward the pipe) */
    @keyframes ventFlow {
      from { background-position: -130% 0; }
      to   { background-position: 230% 0; }
    }
    #screen-question.current-on .vent-bar {
      background: linear-gradient(90deg, #1aa84a 0%, #5dff95 42%, #eaffef 50%, #5dff95 58%, #1aa84a 100%);
      background-size: 260% 100%;
      box-shadow: 0 0 13px rgba(60,255,140,.9), inset 0 0 4px rgba(255,255,255,.45);
      animation: ventFlow 1.0s linear infinite;
    }
    #screen-question.current-on .vent-bar:nth-child(1) { animation-delay: 0s; }
    #screen-question.current-on .vent-bar:nth-child(2) { animation-delay: 0.12s; }
    #screen-question.current-on .vent-bar:nth-child(3) { animation-delay: 0.24s; }

    /* Switch row */
    #switch-row {
      position: absolute;
      left: 0; right: 0;
      top: 156px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 23px;
      z-index: 2;
    }

    /* ── Switch tile (slot) ── */
    .sw {
      width: 128px; height: 174px;
      flex-shrink: 0;
      border-radius: 11px;
    }
    .tile {
      position: relative;
      width: 100%; height: 100%;
      background-image: url('assets/figma/tile.webp');
      background-repeat: no-repeat;
      background-size: 248.81% 138.26%;
      background-position: 49.6% 57.92%;
      border-radius: 8px;
    }
    .tile-num {
      position: absolute;
      left: 50%; top: 45%;
      transform: translate(-50%, -50%);
      font-family: 'Lilita One', cursive;
      font-weight: 400;
      font-size: 80px;
      line-height: 1;
      color: #000;
    }

    @keyframes correctGlow {
      0%   { box-shadow: 0 0  0px  0px rgba(255,255,255,0); }
      25%  { box-shadow: 0 0 22px 10px rgba(255,255,255,.95), 0 0 50px 20px rgba(255,255,255,.4); }
      100% { box-shadow: 0 0  0px  0px rgba(255,255,255,0); }
    }

    .sw.filled .tile  { animation: fadeIn 0.3s ease both; }
    .sw.new           { animation: correctGlow 0.95s ease-out both; }
    .sw.new    .tile  { animation: popIn  0.55s ease both; }

    /* "read the pattern" highlight — each prefilled switch pops + glows as its number is read */
    @keyframes readPop {
      0%   { transform: scale(1);    filter: drop-shadow(0 0 0 rgba(0,229,255,0)); }
      40%  { transform: scale(1.16); filter: drop-shadow(0 0 16px rgba(0,229,255,.95)); }
      100% { transform: scale(1);    filter: drop-shadow(0 0 0 rgba(0,229,255,0)); }
    }
    .sw.read-pop { animation: readPop 0.62s ease-out; position: relative; z-index: 4; }

    /* Empty slots — cyan neon border (Figma #a3fffc) */
    .sw.empty {
      background: transparent;
      border: 4px solid #a3fffc;
      border-radius: 11px;
    }
    /* active "place here" slot — cyan glow per the Figma design (#69f4f9 layered) */
    .sw.empty.next-slot {
      border: 4px solid #a3fffc;
      box-shadow:
        0 0 3px #69f4f9,
        0 0 6px #69f4f9,
        0 0 21px #69f4f9,
        0 0 42px rgba(105,244,249,0.85),
        0 0 72px rgba(105,244,249,0.6),
        0 0 125px rgba(105,244,249,0.45);
    }

    @keyframes wrongGlowPulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,176,32,0);           outline-color: rgba(255,200,96,.35); }
      16%  { box-shadow: 0 0 34px 12px rgba(255,176,32,.95), 0 0 68px 26px rgba(255,150,20,.5); outline-color: #ffc23c; }
      100% { box-shadow: 0 0 18px 4px rgba(255,176,32,.7);    outline-color: #ffb020; }
    }
    .sw.wrong { animation: shake 0.45s ease; }
    .sw.wrong-option { animation: shake 0.45s ease; }
    .sw.wrong .tile,
    .sw.wrong-option .tile {
      outline: 3px solid #ffb020;
      border-radius: 8px;
      animation: wrongGlowPulse 0.8s ease-out both;
    }

    /* sparks flung from a wrong switch (warm amber/gold — no red) */
    .spark {
      position: absolute;
      left: 50%; top: 45%;
      width: 6px; height: 6px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 40;
      box-shadow: 0 0 10px 3px rgba(255,190,70,.95);
    }
    .spark-burst {
      position: absolute;
      left: 50%; top: 45%;
      width: 110px; height: 110px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 39;
      background: radial-gradient(circle, rgba(255,228,150,.95) 0%, rgba(255,184,70,.5) 40%, rgba(255,184,70,0) 70%);
    }

    /* All switches shake together on wrong answer */
    #switch-row.shaking .sw { animation: shake 0.45s ease; }

    /* Completed-row switch styling */
    .sw.complete-fill .tile {
      outline: 2px solid rgba(120, 235, 255, 0.8);
      box-shadow: 0 0 12px rgba(0, 220, 255, .45);
      border-radius: 8px;
      animation: fadeIn 0.3s ease both;
    }

    /* Panel green-glow state for row-complete */
    @keyframes greenBorderPulse {
      0%,100% { box-shadow: 0 0 0 4px #4afa7c, 0 0 35px rgba(74,250,124,.55), 0 0 80px rgba(74,250,124,.22); }
      50%     { box-shadow: 0 0 0 4px #4afa7c, 0 0 62px rgba(74,250,124,.88), 0 0 130px rgba(74,250,124,.42); }
    }

    #main-panel.row-complete {
      left: 72px; top: 130px;
      width: 1776px; height: 820px;
      border-radius: 24px;
      background: #041840;
      z-index: 10;
      animation: greenBorderPulse 1.2s ease-in-out infinite;
      transition: top 0.35s ease, height 0.35s ease, width 0.35s ease, left 0.35s ease, background 0.3s ease;
    }
    #main-panel.row-complete #panel-frame { opacity: 0; }
    #main-panel.row-complete #switch-row {
      top: 50%;
      transform: translateY(-50%);
      transition: filter 0.3s ease, opacity 0.3s ease;
    }

    /* Hide surrounding chrome during celebration */
    #screen-question.celebrating #qrobot,
    #screen-question.celebrating #power-btn,
    #screen-question.celebrating #bot-bar,
    #screen-question.celebrating .connector,
    #screen-question.celebrating #options-box {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    /* Hide switches when Well done appears */
    #main-panel.well-done-active #switch-row {
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    /* Well done overlay */
    @keyframes wellDonePop {
      from { opacity: 0; transform: translate(-50%, -50%) scale(0.55); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes robotDance {
      0%,100% { transform: translateY(0)    rotate(0deg);   }
      15%     { transform: translateY(-18px) rotate(-8deg);  }
      30%     { transform: translateY(0)    rotate(0deg);   }
      45%     { transform: translateY(-14px) rotate(7deg);   }
      60%     { transform: translateY(0)    rotate(0deg);   }
      75%     { transform: translateY(-10px) rotate(-5deg);  }
      90%     { transform: translateY(0)    rotate(0deg);   }
    }

    #well-done-msg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      pointer-events: none;
      z-index: 20;
      white-space: nowrap;
      animation: wellDonePop 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    #well-done-msg.hidden { display: none !important; }

    #robot-dance {
      width: 180px;
      height: auto;
      animation: robotDance 1s ease-in-out infinite;
      filter: drop-shadow(0 0 18px rgba(0,220,255,.45));
    }

    #well-done-text {
      font-family: 'Exo 2', sans-serif;
      font-size: 110px;
      font-weight: 900;
      color: #00e8ff;
      letter-spacing: 2px;
      text-shadow: 0 0 40px rgba(0,232,255,.7), 0 0 80px rgba(0,200,255,.35), 0 4px 0 rgba(0,0,0,.45);
    }

    /* Wrong answer message */
    #wrong-msg {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -58%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      pointer-events: none;
      z-index: 10;
    }
    #wrong-msg.hidden { display: none !important; }

    /* Options box (bottom) */
    #options-box {
      position: absolute;
      left: 488.38px; top: 728px;
      width: 742.047px; height: 256px;
      z-index: 3;
    }
    #options-box .frame {
      position: absolute;
      left: -0.79%; top: 0;
      width: 101.58%; height: 102.3%;
      pointer-events: none;
    }
    #options-area {
      position: absolute;
      left: 0; right: 0;
      top: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 38px;
      z-index: 2;
    }
    #options-area.invisible { visibility: hidden; pointer-events: none; }

    @keyframes optTilePop {
      0%   { opacity: 0; transform: translateY(24px) scale(0.55); }
      60%  { opacity: 1; transform: translateY(-5px) scale(1.12); }
      80%  {             transform: translateY(2px)  scale(0.96); }
      100% { opacity: 1; transform: translateY(0)    scale(1); }
    }
    #options-area.hidden-initially {
      opacity: 0;
      pointer-events: none;
    }
    /* all 4 option switches pop in together AFTER the box has deployed */
    #options-area.reveal .sw {
      animation: optTilePop 0.95s cubic-bezier(0.34,1.5,0.5,1) both;
    }

    /* ── Deploy: options box emerges from the main panel ── */
    /* 1. the two link pipes shoot down out of the panel bottom */
    .opt-pipe { transform-origin: top center; }
    .opt-pipe.hidden-initially { opacity: 0; transform: scaleY(0); }
    .opt-pipe.extend { animation: pipeExtend 0.95s cubic-bezier(0.3, 1, 0.4, 1) both; }
    @keyframes pipeExtend {
      0%   { opacity: 0.25; transform: scaleY(0); }
      70%  { opacity: 1;    transform: scaleY(1.06); }
      100% { opacity: 1;    transform: scaleY(1); }
    }

    /* 2. the box unfolds downward out of the panel, riding the pipes */
    #options-box { transform-origin: top center; }
    #options-box.hidden-initially { opacity: 0; pointer-events: none; }
    #options-box.deploy {
      animation: optionsBoxDeploy 1.4s cubic-bezier(0.22, 1.15, 0.36, 1) both;
    }
    @keyframes optionsBoxDeploy {
      0%   { opacity: 0; transform: translateY(-70px) scaleY(0.5);
             filter: brightness(1.7) drop-shadow(0 0 30px rgba(15,229,250,.95)); }
      55%  { opacity: 1; transform: translateY(14px) scaleY(1.06);
             filter: brightness(1.25) drop-shadow(0 0 18px rgba(15,229,250,.6)); }
      78%  { transform: translateY(-5px) scaleY(0.99); }
      100% { opacity: 1; transform: translateY(0) scaleY(1); filter: none; }
    }
    /* on completion the option placeholder retracts back up into the panel/vent */
    #options-box.retract { animation: optionsBoxRetract 0.55s cubic-bezier(0.5, 0, 0.75, 0.4) forwards; }
    @keyframes optionsBoxRetract {
      0%   { opacity: 1; transform: translateY(0) scaleY(1); }
      100% { opacity: 0; transform: translateY(-80px) scaleY(0.32); }
    }
    .opt-pipe.retract { animation: pipeRetract 0.5s ease forwards; }
    @keyframes pipeRetract {
      from { opacity: 1; transform: scaleY(1); }
      to   { opacity: 0; transform: scaleY(0); }
    }

    /* Option tiles — slightly smaller than the row tiles */
    #options-area .sw { width: 112.208px; height: 152.533px; }
    #options-area .tile-num { font-size: 70px; }

    .sw.option {
      cursor: pointer;
      transition: transform 0.13s;
    }
    .sw.option:hover { transform: scale(1.08); }

    .sw.hint { cursor: pointer; position: relative; animation: hintGlow 1s ease-in-out infinite; }
    .sw.hint .tile {
      outline: 3px solid #00e5ff;
      border-radius: 8px;
    }
    .sw.hint:hover { transform: scale(1.08); }


    /* ════════════════════════════════════════════
       LEVEL INTRO SCREEN
    ════════════════════════════════════════════ */
    .level-stage-lbl {
      font-family: 'Exo 2', sans-serif;
      font-size: 15px; font-weight: 600;
      letter-spacing: 8px;
      color: rgba(0,229,255,.55);
      text-transform: uppercase;
      margin-bottom: -12px;
    }
    .level-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 110px; letter-spacing: 6px;
      color: #00e5ff;
      text-shadow: 0 0 40px rgba(0,229,255,.6), 0 0 80px rgba(0,200,255,.25);
    }
    .level-pattern-wrap {
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      margin-top: 4px;
    }
    .level-pattern-lbl {
      font-family: 'Exo 2', sans-serif;
      font-size: 20px; color: rgba(160,190,210,.65);
    }
    .level-pattern-tiles {
      display: flex; align-items: center; gap: 12px;
    }
    .level-tile {
      width: 84px; height: 84px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(18, 28, 48, 0.82);
      border: 1.5px solid rgba(0, 210, 230, 0.42);

      font-size: 46px; font-weight: 800;
      color: #00d8f0;
      text-shadow: 0 0 12px rgba(0,210,235,.55);
    }
    .level-tile-dots {
      width: 84px; height: 84px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
      background: rgba(14, 22, 40, 0.65);
      border: 1.5px solid rgba(0,210,230,.20);
      border-radius: 16px;
      font-family: 'Exo 2', sans-serif;
      font-size: 18px; font-weight: 700;
      color: rgba(0,210,230,.45);
      letter-spacing: 3px;
    }
    .level-tile-dots::before {
      content: '';
      position: absolute;
      top: 9px; right: 9px;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(0,210,230,.50);
    }

    /* ════════════════════════════════════════════
       INTRO / LEVEL / COMPLETE SCREENS
    ════════════════════════════════════════════ */
    #screen-intro {
      position: absolute;
      inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 80px;
      animation: fadeIn 0.5s ease;
    }

    #title-screen-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
    }

    /* ── Title-screen PLAY button (image asset, bottom-right corner) ── */
    #screen-intro .btn-play {
      position: absolute;
      right: 104px; bottom: 88px;
      z-index: 2;
    }
    .btn-play {
      background: none; border: none; padding: 0; margin: 0; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      width: 300px; line-height: 0;
      will-change: transform;
    }
    .btn-play img {
      width: 300px; height: auto; display: block;
      will-change: transform, filter;
      /* fallback shaped glow + depth (GSAP animates this when loaded) */
      filter: drop-shadow(0 0 16px rgba(12,228,249,0.5)) drop-shadow(0 7px 14px rgba(0,16,32,0.55));
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px;
      animation: fadeIn 0.5s ease;
    }

    .level-float { animation: float 2s ease-in-out infinite; }

    /* ── Themed sci-fi START button (built in CSS, crisp at any scale) ── */
    .btn-start {
      position: relative;
      width: 300px; height: 92px;
      border: none; padding: 0; margin: 0; cursor: pointer;
      background: transparent;
      font-family: 'Exo 2', sans-serif;
      -webkit-tap-highlight-color: transparent;
      filter: drop-shadow(0 6px 14px rgba(0,12,28,.55));
      transition: transform 0.16s ease;
      animation: startFloat 3s ease-in-out infinite;
    }
    /* chamfered shape shared by every layer */
    .btn-start::before,
    .btn-start::after,
    .btn-start .shine {
      clip-path: polygon(20px 0, calc(100% - 20px) 0, 100% 50%, calc(100% - 20px) 100%,
                         20px 100%, 0 50%);
    }
    /* outer bright-cyan rim */
    .btn-start::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(180deg, #d4fbff 0%, #21e6fa 32%, #0aa6cf 62%, #0b4c78 100%);
      box-shadow: 0 0 26px rgba(12,228,249,.55);
      animation: startGlow 2.4s ease-in-out infinite;
    }
    /* inner glassy blue fill, inset to leave the rim showing */
    .btn-start::after {
      content: ''; position: absolute; inset: 4px;
      background:
        linear-gradient(180deg, rgba(190,250,255,.55) 0%, rgba(57,110,150,.6) 16%,
                        #1d4a72 46%, #0c2a48 100%);
    }
    /* moving sheen */
    .btn-start .shine {
      position: absolute; inset: 0; z-index: 1; pointer-events: none;
      background: linear-gradient(115deg, transparent 38%, rgba(255,255,255,.55) 50%, transparent 62%);
      background-size: 250% 100%; background-position: 160% 0;
      animation: startShine 3.4s ease-in-out infinite;
    }
    .btn-start .lbl {
      position: absolute; inset: 0; z-index: 2;
      display: flex; align-items: center; justify-content: center; gap: 14px;
      font-size: 38px; font-weight: 800; letter-spacing: 5px;
      text-transform: uppercase; color: #ffffff;
      text-shadow: 0 0 12px rgba(12,228,249,.9), 0 2px 3px rgba(0,24,44,.7);
      padding-left: 4px;   /* optical centering with the letter-spacing */
    }
    .btn-start .lbl::before {
      content: '▶'; font-size: 22px; line-height: 1;
      color: #eafdff; text-shadow: 0 0 14px rgba(12,228,249,1);
      transform: translateY(1px);
    }
    .btn-start:hover { transform: scale(1.05); }
    .btn-start:hover::before { filter: brightness(1.12); box-shadow: 0 0 38px rgba(12,228,249,.85); }
    .btn-start:active { transform: scale(0.97); }

    @keyframes startGlow {
      0%, 100% { box-shadow: 0 0 18px rgba(12,228,249,.45); }
      50%      { box-shadow: 0 0 34px rgba(12,228,249,.8); }
    }
    @keyframes startFloat {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(-6px); }
    }
    @keyframes startShine {
      0%       { background-position: 160% 0; }
      55%, 100%{ background-position: -60% 0; }
    }

    .hidden { display: none !important; }

    /* ── Rotate-to-landscape hint (narrow portrait phones only) ── */
    #rotate-hint {
      display: none;
      position: fixed; inset: 0;
      z-index: 1000;
      background: radial-gradient(circle at 50% 40%, #0c1d38 0%, #05101f 100%);
      flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; text-align: center; padding: 24px;
      font-family: 'Exo 2', sans-serif;
    }
    #rotate-hint .rotate-phone {
      font-size: 76px; line-height: 1;
      animation: rotateTilt 1.8s ease-in-out infinite;
      filter: drop-shadow(0 0 18px rgba(0,229,255,.6));
    }
    #rotate-hint .rotate-text {
      font-size: 28px; font-weight: 800; color: #00e5ff;
      text-shadow: 0 0 22px rgba(0,229,255,.55); letter-spacing: 1px;
    }
    #rotate-hint .rotate-sub {
      font-size: 16px; color: rgba(200,215,225,.7);
    }
    @keyframes rotateTilt {
      0%, 100% { transform: rotate(0deg); }
      50%      { transform: rotate(-90deg); }
    }
    /* show only on small portrait screens (phones), where 16:9 would be unplayably small */
    @media (orientation: portrait) and (max-width: 920px) {
      #rotate-hint { display: flex; }
    }

    /* ── Loading screen ── */
    #loader {
      position: fixed; inset: 0; z-index: 2000;
      background: #06111e;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
      font-family: 'Exo 2', sans-serif;
      transition: opacity 0.45s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .loader-ring {
      width: 62px; height: 62px;
      border: 5px solid rgba(0,229,255,0.2);
      border-top-color: #00e5ff;
      border-radius: 50%;
      animation: loaderSpin 0.9s linear infinite;
    }
    @keyframes loaderSpin { to { transform: rotate(360deg); } }
    .loader-bar {
      width: 260px; height: 8px;
      background: rgba(0,229,255,0.15);
      border-radius: 5px; overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #00b8c4, #00e5ff);
      border-radius: 5px;
      transition: width 0.25s ease;
    }
    .loader-text {
      color: #00e5ff; font-size: 19px; font-weight: 700;
      letter-spacing: 3px;
      text-shadow: 0 0 16px rgba(0,229,255,.55);
    }

    /* ── Tutorial nudge (tapping hand pointing at the target) ── */
    #nudge {
      position: absolute;
      width: 76px; height: auto;
      z-index: 8;                 /* above gameplay, below the blast doors */
      pointer-events: none;
      display: none;
      filter: drop-shadow(0 5px 9px rgba(0,0,0,0.5));
      transform-origin: top center;
    }
    #nudge.show { display: block; animation: nudgeTap 1.15s ease-in-out infinite; }
    @keyframes nudgeTap {
      0%   { transform: translateY(12px) scale(1); }
      28%  { transform: translateY(-6px) scale(1.03); }   /* lift toward the tile */
      44%  { transform: translateY(1px)  scale(0.95); }    /* tap down */
      60%  { transform: translateY(-2px) scale(1); }
      100% { transform: translateY(12px) scale(1); }
    }

    /* ════════════════════════════════════════════
       CONFETTI — themed energy burst on pattern complete
    ════════════════════════════════════════════ */
    #fx-confetti {
      position: absolute; inset: 0;
      width: 1920px; height: 1080px;
      pointer-events: none;
      z-index: 50;            /* above the gameplay, below the blast doors (60) */
    }

    /* ════════════════════════════════════════════
       LEVEL TRANSITION — sci-fi blast doors
    ════════════════════════════════════════════ */
    #transition {
      position: absolute; inset: 0;
      z-index: 60; pointer-events: none;
      overflow: hidden;
    }
    #transition.hidden { display: none !important; }
    .trans-half {
      position: absolute; left: 0; width: 100%; height: 51%;
      background:
        repeating-linear-gradient(90deg, rgba(15,229,250,0.045) 0 2px, transparent 2px 72px),
        linear-gradient(180deg, #0c1d38 0%, #05101f 100%);
      transition: transform 0.65s cubic-bezier(0.55, 0, 0.3, 1);
    }
    .trans-top {
      top: 0; transform: translateY(-100%);
      border-bottom: 4px solid #848ea9;
      box-shadow: inset 0 -10px 26px rgba(15,229,250,.30), 0 7px 34px rgba(15,229,250,.55);
    }
    .trans-bottom {
      bottom: 0; transform: translateY(100%);
      border-top: 4px solid #848ea9;
      box-shadow: inset 0 10px 26px rgba(15,229,250,.30), 0 -7px 34px rgba(15,229,250,.55);
    }
    #transition.closed .trans-top,
    #transition.closed .trans-bottom { transform: translateY(0); }

    .trans-flash {
      position: absolute; left: 0; top: 50%;
      width: 100%; height: 6px;
      transform: translateY(-50%) scaleX(0);
      background: linear-gradient(90deg, transparent, #aef6ff 18%, #ffffff 50%, #aef6ff 82%, transparent);
      box-shadow: 0 0 34px 10px rgba(15,229,250,.9);
      opacity: 0;
    }
    #transition.closed .trans-flash { animation: seamFlash 0.65s ease-out forwards; }
    @keyframes seamFlash {
      0%,52% { opacity: 0;    transform: translateY(-50%) scaleX(0); }
      74%    { opacity: 1;    transform: translateY(-50%) scaleX(1); }
      100%   { opacity: 0.45; transform: translateY(-50%) scaleX(1); }
    }

    /* ════════════════════════════════════════════
       END / COMPLETE SCREEN
    ════════════════════════════════════════════ */
    #screen-complete {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #06111e;
      animation: fadeIn 0.55s ease both;
    }
    #end-video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    #end-panel {
      position: relative;
      width: 1776px; height: 900px;
      background: #041840;
      border-radius: 24px;
      animation: greenBorderPulse 1.2s ease-in-out infinite;
      display: flex;

    #end-title {

      text-shadow: 0 0 40px rgba(0,232,255,.75), 0 0 80px rgba(0,200,255,.4), 0 4px 0 rgba(0,0,0,.5);
      white-space: nowrap;
      text-align: center;
      animation: wellDonePop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;

    #end-rows {
      display: flex;
      flex-direction: column;
      gap: 22px;
      width: 100%;
      align-items: center;
      justify-content: center;

    .end-row {

    .end-row .sw {
      width: 96px; height: 130px;
    }
    .end-row .tile-num { font-size: 58px; }
  </style>
</head>

<!-- GSAP (for the play-button attention effects) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
  /* ── Voice lines ─────────────────────────────────── */
  const voiceTapCorrect = new Audio('audio/tap the correct switch .ogg');
  const voiceUhOh       = new Audio('audio/Uh-oh! Try again!.ogg');
  const voiceHint       = new Audio("audio/Check the pattern again.ogg");

  /* ── Switch appear sounds ────────────────────────── */
  const sfxSwitch3 = new Audio('audio/3.ogg');
  const sfxSwitch5 = new Audio('audio/5.ogg');
  const sfxSwitch4  = new Audio('audio/4.ogg');
  const sfxSwitch7  = new Audio('audio/7.ogg');
  const sfxSwitch10 = new Audio('audio/10.ogg');
  const sfxSwitch11 = new Audio('audio/11.ogg');
  const sfxSwitch13 = new Audio('audio/13.ogg');

  const LEVEL_SWITCH_SOUNDS = {
    0: [sfxSwitch3, sfxSwitch5],
    1: [sfxSwitch4, sfxSwitch7],
    2: [sfxSwitch7, sfxSwitch10],
    3: [sfxSwitch11, sfxSwitch13],
  };

  function playSwitchAppear(index) {
    const sounds = LEVEL_SWITCH_SOUNDS[currentRow];
    if (!sounds) return;
    const snd = sounds[index % 2];
    snd.currentTime = 0;
    snd.play().catch(() => {});
  }

  let _voicePlaying = false;
  const _voiceQueue = [];

  function _setOptionsLock(locked) {
    const el = document.getElementById('options-area');
    if (el) el.style.pointerEvents = locked ? 'none' : '';
    /* the tutorial nudge only shows while the player can actually tap */
    if (locked) hideNudge(); else maybeShowNudge();
  }

  /* ── Tutorial nudge: a tapping hand pointing at the correct option ── */
  function hideNudge() {
    const n = document.getElementById('nudge');
    if (n) n.classList.remove('show');
  }
  function maybeShowNudge() {
    const n = document.getElementById('nudge');
    if (!n) return;
    /* tutorial only (level 1), while it's the player's turn to tap */
    if (currentRow !== 0 || (phase !== 'question' && phase !== 'hint')) { hideNudge(); return; }
    const cfg = ROWS_CONFIG[currentRow];
    const up  = getUserPositions(cfg);
    const rowFull = grid[currentRow].length >= (up ? up.length : TOTAL);
    const target = document.querySelector('#options-area .sw.hint');   /* the glowing correct option */
    if (rowFull || !target) { hideNudge(); return; }
    const canvas = document.getElementById('canvas');
    const cr = canvas.getBoundingClientRect();
    const scale = (cr.width / 1920) || 1;
    const tr = target.getBoundingClientRect();
    const fx = (tr.left + tr.width / 2 - cr.left) / scale;   /* target centre-x (canvas coords) */
    const fy = (tr.top + tr.height - cr.top) / scale;         /* target bottom-y */
    const NW = 76, NH = NW * 101 / 56;                        /* nudge display size */
    n.style.width = NW + 'px';
    n.style.left = (fx - NW * 0.36) + 'px';                   /* align fingertip (~36% across) */
    n.style.top  = (fy - NH * 0.03 - 16) + 'px';             /* fingertip just inside the tile bottom */
    n.classList.add('show');
  }

  /* typewriter the dialogue out, blipping softly as the character "speaks" */
  let _typeTimer = null;
  function _typeBotText(text) {
    const el = document.getElementById('bot-text');
    if (!el) return;
    el.textContent = '';
    if (_typeTimer) { clearInterval(_typeTimer); _typeTimer = null; }
    let i = 0;
    _typeTimer = setInterval(() => {
      i++;
      el.textContent = text.slice(0, i);
      const ch = text[i - 1];
      if (i % 2 === 0 && ch && ch !== ' ') sfxTalk();
      if (i >= text.length) { clearInterval(_typeTimer); _typeTimer = null; }
    }, 55);
  }

  function _advanceQueue() {
    if (_voiceQueue.length === 0) {
      _voicePlaying = false;
      _setOptionsLock(false);
      return;
    }
    const item = _voiceQueue.shift();
    _voicePlaying = true;
    _setOptionsLock(true);
    let advanced = false;
    const finish = () => {
      if (advanced) return; advanced = true;
      if (item.onDone) item.onDone();
      _advanceQueue();
    };
    if (item.action) {
      /* custom step (e.g. read the pattern aloud) — no bot text; calls finish when done */
      item.action(finish);
      return;
    }
    _typeBotText(item.text);
    if (item.audio) {
      item.audio.currentTime = 0;
      item.audio.onended = finish;
      /* no voice file → advance once the text has typed out + a short read hold */
      item.audio.play().catch(() => setTimeout(finish, item.text.length * 55 + 900));
    } else {
      /* narration line with no audio → hold long enough to read */
      setTimeout(finish, item.text.length * 55 + 1300);
    }
  }

  function queueBotText(text, audio, onDone) {
    _voiceQueue.push({ text, audio, onDone });

    const values = [3, 5, 3, 5, 3];
    let i = 0;
    function playNext() {
      if (i >= values.length) { setTimeout(done, 350); return; }
      const v = values[i];
      const snd = v === 3 ? sfxSwitch3 : sfxSwitch5;
      const t = tiles[i];
      if (t) { t.classList.remove('read-pop'); void t.offsetWidth; t.classList.add('read-pop'); }
      i++;
      /* when this number's audio ends, play the next one (small breath between) */
      snd.onended = () => { snd.onended = null; setTimeout(playNext, 160); };
      snd.currentTime = 0;
      snd.play().catch(() => { snd.onended = null; setTimeout(playNext, 700); });  /* fallback if audio can't play */

  let _master = null;
  function masterGain() {
    if (!_master) {
      const ctx = ac();
      _master = ctx.createGain();
      _master.gain.value = 1.9;
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -10;
      comp.ratio.value = 12;
      comp.attack.value = 0.003;
      comp.release.value = 0.25;
      _master.connect(comp);
      comp.connect(ctx.destination);

    return _master;
  }

  /* ── Background music: a gentle synthesized sci-fi ambient loop ──
     Routed on its own low gain (bypasses the SFX master boost) so it stays
     balanced and never overpowers the interaction sounds. */
  const BGM_VOL = 0.6;
  let _bgmOn = false, _bgmGain = null, _bgmTimer = null, _bgmStep = 0;
  /* calm chord progression (Hz): Am → F → C → G, low + airy */
  const BGM_CHORDS = [
    [220.00, 261.63, 329.63],   /* Am */
    [174.61, 220.00, 261.63],   /* F  */
    [196.00, 246.94, 329.63],   /* C/G-ish */
    [196.00, 293.66, 392.00],   /* G  */
  ];
  function _bgmBar() {
    if (!_bgmOn) return;
    const ctx = ac();
    const chord = BGM_CHORDS[_bgmStep % BGM_CHORDS.length];
    const t0 = ctx.currentTime + 0.04;
    const BAR = 3.6;
    /* soft pad — each chord note swells in and out over the bar */
    chord.forEach((f, idx) => {
      const o = ctx.createOscillator(), g = ctx.createGain(), lp = ctx.createBiquadFilter();
      o.type = idx === 0 ? 'sine' : 'triangle';
      o.frequency.value = f;
      o.detune.value = (idx - 1) * 4;
      lp.type = 'lowpass'; lp.frequency.value = 1100;
      o.connect(lp); lp.connect(g); g.connect(_bgmGain);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(0.14, t0 + 1.3);
      g.gain.linearRampToValueAtTime(0.0001, t0 + BAR);
      o.start(t0); o.stop(t0 + BAR + 0.1);
    });
    /* gentle sparkle arpeggio (an octave up), very soft */
    const steps = 6;
    for (let s = 0; s < steps; s++) {
      const f = chord[s % chord.length] * 2;
      const at = t0 + s * (BAR / steps);
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.type = 'sine'; o.frequency.value = f;
      o.connect(g); g.connect(_bgmGain);
      g.gain.setValueAtTime(0.0001, at);
      g.gain.linearRampToValueAtTime(0.05, at + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, at + 0.5);
      o.start(at); o.stop(at + 0.55);
    }
    _bgmStep++;
    _bgmTimer = setTimeout(_bgmBar, BAR * 1000);
  }
  function startBgm() {
    if (_bgmOn) return;
    const ctx = ac();
    if (ctx.state === 'suspended') ctx.resume().catch(() => {});
    _bgmOn = true;
    _bgmGain = ctx.createGain();
    _bgmGain.gain.setValueAtTime(0.0001, ctx.currentTime);
    _bgmGain.gain.linearRampToValueAtTime(BGM_VOL, ctx.currentTime + 3);   /* fade in */
    _bgmGain.connect(ctx.destination);
    _bgmStep = 0;
    _bgmBar();
  }
  function duckBgm(on) {   /* lower the music under the end-video, restore on reset */
    if (!_bgmGain) return;
    const ctx = ac();
    _bgmGain.gain.cancelScheduledValues(ctx.currentTime);
    _bgmGain.gain.linearRampToValueAtTime(on ? 0.06 : BGM_VOL, ctx.currentTime + 0.6);
  }

    /* electric crackle bursts */
    [0, 0.13, 0.28, 0.44, 0.6].forEach(t => {
      const buf = ctx.createBuffer(1, ctx.sampleRate * 0.045, ctx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.005));
      const s = ctx.createBufferSource(), bp = ctx.createBiquadFilter(), cg = ctx.createGain();
      s.buffer = buf; bp.type = 'highpass'; bp.frequency.value = 2400; cg.gain.value = 0.5;
      s.connect(bp); bp.connect(cg); cg.connect(out);
      s.start(t0 + t);
    });

    /* bright confirm shimmer at the end */
    const o2 = ctx.createOscillator(), g2 = ctx.createGain();
    o2.type = 'sine';
    o2.frequency.setValueAtTime(1250, t0 + 0.45);
    o2.frequency.exponentialRampToValueAtTime(1950, t0 + 0.78);
    g2.gain.setValueAtTime(0.0001, t0 + 0.45);
    g2.gain.exponentialRampToValueAtTime(0.22, t0 + 0.55);
    g2.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.9);
    o2.connect(g2); g2.connect(out);
    o2.start(t0 + 0.45); o2.stop(t0 + 0.9);
  }

  /* ── Scale canvas to fit any viewport (letterboxed, aspect-preserved) ── */
  function scaleCanvas() {
    const el = document.getElementById('canvas');
    if (!el) return;
    const vp = window.visualViewport;
    const vw = (vp && vp.width)  || window.innerWidth  || document.documentElement.clientWidth;
    const vh = (vp && vp.height) || window.innerHeight || document.documentElement.clientHeight;
    const s  = Math.min(vw / 1920, vh / 1080);
    /* centre the scaled canvas with an explicit translate (letterbox offsets) */
    const tx = Math.round((vw - 1920 * s) / 2);
    const ty = Math.round((vh - 1080 * s) / 2);
    el.style.transform = `translate(${tx}px, ${ty}px) scale(${s})`;
  }
  let _scaleRAF = null;
  function requestScale() {
    if (_scaleRAF) cancelAnimationFrame(_scaleRAF);
    _scaleRAF = requestAnimationFrame(scaleCanvas);
  }
  window.addEventListener('resize', requestScale);
  window.addEventListener('orientationchange', requestScale);
  if (window.visualViewport) window.visualViewport.addEventListener('resize', requestScale);
  scaleCanvas();
  /* a couple of follow-up passes catch mobile address-bar / late layout shifts */
  window.addEventListener('load', scaleCanvas);
  setTimeout(scaleCanvas, 300);

  /* ── Game config ───────────────────────────────── */
  const ROWS_CONFIG = [
    { pattern: [3, 5],   options: [3, 6, 5, 4],    label: 'Level 1'  },
    { pattern: [4, 7],   options: [4, 5, 8, 7],    label: 'Level 2'  },
    { pattern: [7, 10],  options: [10, 9, 11, 7],  label: 'Level 3'  },
    { pattern: [11, 13], options: [13, 12, 11, 10], label: 'Level 4',
      scaffold: { 0: 11, 1: 13, 2: 11, 4: 11, 7: 13 } },
  ];
  const TOTAL = 8, PREFILLED = 5;
  const SWITCH_OFFSET_MS = 3850;   /* wait for the box to open + the pipe & power to appear */
  const SWITCH_STEP_MS   = 340;    /* gap between each switch dropping in */

  function getUserPositions(cfg) {
    if (!cfg.scaffold) return null;
    const s = new Set(Object.keys(cfg.scaffold).map(Number));
    const pos = [];
    for (let i = 0; i < TOTAL; i++) if (!s.has(i)) pos.push(i);
    return pos;
  }

  /* ── State ─────────────────────────────────────── */
  let phase       = 'intro';
  let currentRow  = 0;
  let grid        = [];
  let wrongCount  = 0;
  let wrongAnswer = null;
  let showHint    = false;
  let lvl1Guide   = false;   /* Level 1: highlight the correct option once the tap prompt appears */
  let justPlaced  = false;
  let firstRender = false;
  let score       = 0;
  let streak      = 0;
  let timer       = null;
  let levelTimer  = null;

  function initGrid() {
    grid = ROWS_CONFIG.map(r => {
      if (r.scaffold) return [];
      const full = [];
      for (let i = 0; i < TOTAL; i++) full.push(r.pattern[i % r.pattern.length]);
      return full.slice(0, PREFILLED);
    });
  }

  function getCorrect(cfg, filledCount) {
    if (cfg.scaffold) {
      const pos = getUserPositions(cfg);
      return cfg.pattern[pos[filledCount] % cfg.pattern.length];
    }
    return cfg.pattern[filledCount % cfg.pattern.length];
  }

  /* ── Screen switching ──────────────────────────── */
  function showScreen(name) {
    ['intro','level','question','complete'].forEach(s =>
      document.getElementById('screen-' + s).classList.toggle('hidden', s !== name)
    );
  }

  /* Blast-door transition: doors slide shut, swap the screen behind them, slide open */
  function playTransition(swap) {
    const t = document.getElementById('transition');
    t.classList.remove('hidden', 'closed');
    void t.offsetWidth;
    t.classList.add('closed');                       /* doors slide shut */
    sfxPowerDown();
    setTimeout(() => { if (swap) swap(); }, 700);    /* swap the screen while covered */
    setTimeout(() => {
      t.classList.remove('closed');                  /* doors slide open on the new screen */
      sfxPowerUp();
      setTimeout(() => t.classList.add('hidden'), 700);
    }, 1050);
  }

  /* ── DOM builder ───────────────────────────────── */
  function makeSw(num, stateClass, onClick) {
    const div = document.createElement('div');
    div.className = 'sw ' + stateClass;
    if (num != null) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      const span = document.createElement('span');
      span.className = 'tile-num';
      span.textContent = String(num);
      tile.appendChild(span);
      div.appendChild(tile);
    }
    if (onClick) {
      /* hover sound — throttled so rapid mouse moves don't stack */
      let hoverCooldown = false;
      div.addEventListener('mouseenter', () => {
        if (hoverCooldown) return;
        sfxHover();
        hoverCooldown = true;
        setTimeout(() => { hoverCooldown = false; }, 80);
      });
      /* click sound fires immediately; game logic fires after */
      div.addEventListener('click', () => { sfxClick(); onClick(); });
    }
    return div;
  }

  /* ── Sparks: fling glowing particles from a wrong switch ── */
  function spawnSparks(el, count, opts) {
    if (!el) return;
    count = count || 20;
    opts = opts || {};
    const hueBase = opts.hue != null ? opts.hue : 40;   /* default amber; pass ~190 for cyan */

    /* central burst flash for impact */
    const burst = document.createElement('div');
    burst.className = 'spark-burst';
    if (opts.burst) burst.style.background = opts.burst;
    el.appendChild(burst);
    burst.animate([
      { transform: 'translate(-50%,-50%) scale(0.2)', opacity: 0.95 },
      { transform: 'translate(-50%,-50%) scale(1.9)', opacity: 0 }
    ], { duration: 380, easing: 'ease-out' }).onfinish = () => burst.remove();

    for (let i = 0; i < count; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      const size = 5 + Math.random() * 7;
      s.style.width = s.style.height = size + 'px';
      const hue = hueBase + Math.random() * 20;
      s.style.background = `radial-gradient(circle, #fff 0%, hsl(${hue},100%,60%) 70%)`;
      s.style.boxShadow = `0 0 10px 3px hsla(${hue},100%,60%,.95)`;
      el.appendChild(s);
      const angle = Math.random() * Math.PI * 2;
      const dist  = 55 + Math.random() * 95;
      const dx    = Math.cos(angle) * dist;
      const up    = -Math.abs(Math.sin(angle) * dist) * 0.6 - (18 + Math.random() * 42);
      const fall  = 130 + Math.random() * 120;
      const dur   = 480 + Math.random() * 360;
      s.animate([
        { transform: 'translate(-50%,-50%) translate(0px,0px) scale(1)', opacity: 1 },
        { transform: `translate(-50%,-50%) translate(${dx}px, ${up}px) scale(1)`, opacity: 1, offset: 0.35 },
        { transform: `translate(-50%,-50%) translate(${dx * 1.25}px, ${up + fall}px) scale(0.15)`, opacity: 0 }
      ], { duration: dur, easing: 'cubic-bezier(0.18,0.7,0.3,1)' }).onfinish = () => s.remove();
    }
  }

  /* ── Render question screen ────────────────────── */
  function renderQuestion() {
    const cfg     = ROWS_CONFIG[currentRow];
    const row     = grid[currentRow];
    const correct = getCorrect(cfg, row.length);

    const isRowComplete = phase === 'row-complete';

    /* ── Panel & chrome state ── */
    const panel  = document.getElementById('main-panel');
    const botBar = document.getElementById('bot-bar');
    if (isRowComplete) { panel.classList.remove('opening'); document.getElementById('screen-question').classList.remove('intro'); }
    panel.classList.toggle('row-complete', isRowComplete);
    if (!isRowComplete) panel.classList.remove('well-done-active');
    document.getElementById('screen-question').classList.toggle('celebrating', isRowComplete);

    /* Vent bars: green on a correct placement only. A wrong answer is shown on the
       tapped option in the placeholder — never on the switch row / vent circuit. */
    panel.classList.remove('vent-wrong');
    panel.classList.toggle('vent-correct', justPlaced);
    botBar.style.visibility = isRowComplete ? 'hidden' : 'visible';

    /* Well done overlay — reveal handled by the timer in handleAnswer */
    const wellDoneEl = document.getElementById('well-done-msg');
    if (!isRowComplete) {
      wellDoneEl.classList.add('hidden');
    }

    /* Wrong answer overlay */
    const wrongEl = document.getElementById('wrong-msg');
    if (phase === 'wrong') {
      wrongEl.classList.remove('hidden');
      wrongEl.style.animation = 'none';
      wrongEl.offsetHeight;
      wrongEl.style.animation = '';
    } else {
      wrongEl.classList.add('hidden');
    }

    /* ── Switch row container ── */
    const swRow = document.getElementById('switch-row');
    swRow.innerHTML = '';
    swRow.classList.toggle('shaking', phase === 'wrong');
    if (phase === 'wrong') { void swRow.offsetWidth; }

    const userPositions = getUserPositions(cfg);
    const rowFull       = userPositions ? row.length >= userPositions.length : row.length >= TOTAL;

    /* ── Power button (top-right, separate from row) ── */
    const powerEl = document.getElementById('power-btn');
    powerEl.src = rowFull ? 'assets/Green button.webp' : 'assets/Red button.webp';
    powerEl.alt = rowFull ? 'ON' : 'OFF';
    powerEl.classList.toggle('pulsing', rowFull);   /* powers ON (green) when the row is full */
    /* current flows through the pipes the moment the pattern is completed */
    const patternDone = rowFull && !isRowComplete;
    document.getElementById('screen-question').classList.toggle('current-on', patternDone);
    /* main panel border turns green on a correct, completed pattern (Figma success screen) */
    document.getElementById('panel-frame').src = patternDone ? 'assets/figma/panel-green.svg' : 'assets/figma/panel.svg';

    /* ── 8 switch slots ── */
    const stepMs   = SWITCH_STEP_MS;
    const offsetMs = SWITCH_OFFSET_MS;

    for (let i = 0; i < TOTAL; i++) {
      const delayMs = offsetMs + i * stepMs;
      const delay   = firstRender ? `${delayMs / 1000}s` : '0s';

      if (isRowComplete) {
        swRow.appendChild(makeSw(cfg.pattern[i % cfg.pattern.length], 'complete-fill'));
        continue;
      }

      /* ── Scaffold layout (level 4) ── */
      if (cfg.scaffold) {
        if (cfg.scaffold[i] !== undefined) {
          /* pre-filled scaffold position */
          const el = makeSw(cfg.scaffold[i], 'filled');
          const tile = el.querySelector('.tile');
          if (tile && firstRender) { tile.style.animation = 'switchDrop 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) both'; tile.style.animationDelay = delay; }
          swRow.appendChild(el);
          if (firstRender) setTimeout(() => sfxSwitchAppear(i), delayMs);   /* old switch-appear clack (no number audio) */
        } else {
          /* user-fill position */
          const userIdx   = userPositions.indexOf(i);
          const answered  = userIdx < row.length;
          const isCurrent = userIdx === row.length;
          const isWrong   = wrongAnswer != null && isCurrent && phase === 'wrong';
          if (isWrong) {
            swRow.appendChild(makeSw(wrongAnswer, 'wrong'));
          } else if (answered) {
            const isNew = justPlaced && userIdx === row.length - 1;
            const el = makeSw(row[userIdx], isNew ? 'new' : 'filled');
            if (isNew) el.style.animationDelay = delay;
            swRow.appendChild(el);
          } else {
            const div = document.createElement('div');
            div.className = 'sw empty' + (isCurrent ? ' next-slot' : '');
            if (firstRender) { div.style.animation = 'switchDrop 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) both'; div.style.animationDelay = delay; }
            swRow.appendChild(div);
          }
        }
        continue;
      }

      /* ── Standard consecutive layout ── */
      const isFilled = i < row.length;
      const isNew    = justPlaced && isFilled && i === row.length - 1 && i >= PREFILLED;
      const isWrong  = wrongAnswer != null && i === row.length && phase === 'wrong';

      if (isWrong) {
        swRow.appendChild(makeSw(wrongAnswer, 'wrong'));
      } else if (isFilled) {
        const el = makeSw(row[i], isNew ? 'new' : 'filled');
        const tile = el.querySelector('.tile');
        if (tile && firstRender) { tile.style.animation = 'switchDrop 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) both'; tile.style.animationDelay = delay; }
        if (isNew) el.style.animationDelay = delay;
        swRow.appendChild(el);
        if (firstRender) setTimeout(() => sfxSwitchAppear(i), delayMs);   /* old switch-appear clack (no number audio) */
      } else {
        const div = document.createElement('div');
        div.className = 'sw empty' + (i === row.length ? ' next-slot' : '');
        if (firstRender) { div.style.animation = 'switchDrop 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) both'; div.style.animationDelay = delay; }
        swRow.appendChild(div);
      }
    }

    /* ── Options ── */
    const optArea = document.getElementById('options-area');
    optArea.innerHTML = '';
    if (isRowComplete) { optArea.classList.add('invisible'); return; }
    optArea.classList.remove('invisible', 'reveal', 'hidden-initially');
    cfg.options.forEach(opt => {
      const isCorrect      = opt === correct;
      const isWrongOption  = phase === 'wrong-second' && opt === wrongAnswer;
      const isLvl1Glow     = currentRow === 0 && lvl1Guide && isCorrect;
      const cls            = isWrongOption ? 'wrong-option'
                           : (showHint && isCorrect) || isLvl1Glow ? 'hint'
                           : 'option';
      optArea.appendChild(makeSw(opt, cls, isWrongOption ? null : () => handleAnswer(opt)));
    });
  }

  /* ── Game flow ─────────────────────────────────── */
  function buildLevelScreen(cfg) {
    document.getElementById('level-name').textContent = cfg.label.toUpperCase();
    const tiles = document.getElementById('level-pattern-tiles');
    tiles.innerHTML = '';
    [...cfg.pattern, ...cfg.pattern].forEach(num => {
      const t = document.createElement('div');
      t.className = 'level-tile';
      t.textContent = num;
      tiles.appendChild(t);
    });
    const dots = document.createElement('div');
    dots.className = 'level-tile-dots';
    dots.textContent = '···';
    tiles.appendChild(dots);

    if (levelTimer) clearTimeout(levelTimer);
    levelTimer = setTimeout(handleLevelStart, 2500);
  }

  let _starting = false;
  function handleStart(btnEl) {
    if (_starting) return;   /* ignore double taps on Play / Play Again */
    _starting = true;

    /* fresh game state — so the same button works for both Play and Play Again */
    if (timer) clearTimeout(timer);
    if (levelTimer) clearTimeout(levelTimer);
    stopConfetti();
    currentRow = 0; wrongCount = 0; wrongAnswer = null;
    showHint = false; lvl1Guide = false; score = 0; streak = 0;
    initGrid();

    /* unlock the Web Audio context on this user gesture so timed SFX can play later */
    try { const c = ac(); if (c.state === 'suspended') c.resume(); } catch (e) {}
    try { startBgm(); } catch (e) {}    /* background music, on the first user gesture */
    try { duckBgm(false); } catch (e) {} /* restore music if the end video had ducked it */

    /* a little burst of cyan sparks pops off the button before the game starts */
    const btn = btnEl || document.querySelector('.btn-play');
    if (btn) {
      if (window.gsap) gsap.to(btn, { scale: 1.16, duration: 0.13, yoyo: true, repeat: 1, ease: 'power2.out', overwrite: 'auto' });
      spawnSparks(btn, 22, { hue: 188, burst: 'radial-gradient(circle, rgba(220,250,255,.95) 0%, rgba(60,200,255,.5) 42%, rgba(60,200,255,0) 70%)' });
    }
    try { sfxPop(720); } catch (e) {}

    /* let the sparks pop, THEN the blast doors close and the gameplay entrance begins */
    setTimeout(() => { playTransition(() => { handleLevelStart(); }); }, 380);
  }

  function handleLevelStart() {
    phase = 'question';
    showScreen('question');

    /* playful one-by-one entrance: robot → bar → power → pipes → box → switches */
    const sq = document.getElementById('screen-question');
    sq.classList.remove('intro');
    void sq.offsetWidth;
    sq.classList.add('intro');
    setTimeout(() => sq.classList.remove('intro'), 3950);

    /* one-by-one blips: robot, then (after the box) the blue pipe + red power together */
    setTimeout(() => sfxPop(620), 150);   /* robot       */
    setTimeout(() => sfxPop(660), 2950);  /* blue pipe   */
    setTimeout(() => sfxPop(780), 2990);  /* red power   */

    lvl1Guide = false;   /* no option highlight until the tap prompt appears */

    /* reset the top-left character (Byte dance only shows on tutorial completion) */
    document.getElementById('byte-dance').classList.remove('show');
    document.getElementById('qrobot').style.opacity = '';

    /* the bot bar stays hidden until everything else has appeared;
       clear its default text so no stale line flashes when it slides in */
    const botBar = document.getElementById('bot-bar');
    botBar.classList.remove('bar-reveal');
    botBar.classList.add('bar-hidden');
    clearVoiceQueue();
    document.getElementById('bot-text').textContent = '';

    firstRender = true; renderQuestion(); firstRender = false;

    /* robot + bar first, THEN the main box opens, THEN its blue pipe + red power button */
    const panelEl = document.getElementById('main-panel');
    panelEl.classList.remove('opening');
    void panelEl.offsetWidth;
    panelEl.classList.add('opening');
    setTimeout(sfxPanelOpen, 1000);

    /* keep the whole options box + its link pipes tucked away until every
       switch has appeared — then deploy them out of the main panel */
    const optArea = document.getElementById('options-area');
    const optBox  = document.getElementById('options-box');
    const pipes   = document.querySelectorAll('.opt-pipe');
    optBox.classList.remove('deploy', 'retract');  optBox.classList.add('hidden-initially');
    optArea.classList.remove('reveal'); optArea.classList.add('hidden-initially');
    pipes.forEach(p => { p.classList.remove('extend', 'retract'); p.classList.add('hidden-initially'); });

    const unlockDelay = SWITCH_OFFSET_MS + (TOTAL - 1) * SWITCH_STEP_MS + 700;
    setTimeout(() => {
      /* 1 — pipes shoot down out of the panel */
      pipes.forEach(p => {
        p.classList.remove('hidden-initially');
        void p.offsetWidth;
        p.classList.add('extend');
      });
      /* 2 — the (empty) option box deploys out of the panel, with the whoosh */
      setTimeout(() => {
        sfxDeploy();
        optBox.classList.remove('hidden-initially');
        void optBox.offsetWidth;
        optBox.classList.add('deploy');
      }, 560);
      /* 3 — once the box is in place, the option switches pop in one by one */
      setTimeout(() => {
        optArea.classList.remove('hidden-initially');
        void optArea.offsetWidth;
        optArea.classList.add('reveal');
        sfxPop(700);   /* single pop — all four options appear together */
        setTimeout(() => optArea.classList.remove('reveal'), 1400);

        /* 4 — finally the text box slides in, THEN the bot speaks */
        setTimeout(() => {
          botBar.classList.remove('bar-hidden');
          void botBar.offsetWidth;
          botBar.classList.add('bar-reveal');
          sfxBarOpen();
          setTimeout(() => {
            if (currentRow === 0) {
              /* Level 1 — guided tutorial narration */
              queueBotText('Let us start fixing the switches.');
              queueBotText('These switches are in a pattern.');
              queueBotText('Let us read the pattern together.');
              queueAction(readPatternLvl1);   /* plays 3,5,3,5,3 audio + highlights switches (no text) */
              queueAction((d) => { lvl1Guide = true; renderQuestion(); d(); });   /* highlight the correct option as the prompt appears */
              queueBotText('Tap the correct switch to continue the pattern.');
            } else {
              queueBotText('Tap the correct switch.', voiceTapCorrect);
            }
          }, 450);
        }, 750);
      }, 560 + 1400);   /* after the box-deploy animation (1.4s) finishes */
    }, unlockDelay);
  }

  /* Levels after the tutorial: the chrome stays on screen — only the new switches
     refresh and the option placeholder animates back in (no level screen, no re-entrance). */
  function loadLevelInPlace() {
    if (timer) clearTimeout(timer);
    phase = 'question';
    lvl1Guide = false;

    /* drop the previous level's spoken line and show the fresh instruction right away,
       so when the blast doors open the bar already reads "Tap the correct switch." */
    clearVoiceQueue();
    stopConfetti();
    hideNudge();
    document.getElementById('bot-text').textContent = 'Tap the correct switch.';

    /* clear the previous level's completion state — everything else stays put */
    const sq = document.getElementById('screen-question');
    sq.classList.remove('current-on', 'celebrating', 'intro');
    const panel = document.getElementById('main-panel');
    panel.classList.remove('row-complete', 'well-done-active', 'opening');
    document.getElementById('panel-frame').src = 'assets/figma/panel.svg';
    document.getElementById('well-done-msg').classList.add('hidden');
    document.getElementById('byte-dance').classList.remove('show');
    document.getElementById('qrobot').style.opacity = '';
    const botBar = document.getElementById('bot-bar');
    botBar.classList.remove('bar-hidden');     /* the text bar stays */
    botBar.style.visibility = 'visible';

    /* the new level's switches just appear (chrome already in place — no cascade) */
    firstRender = false; renderQuestion();

    /* hide the option box + pipes, then deploy ONLY them with animation */
    const optArea = document.getElementById('options-area');
    const optBox  = document.getElementById('options-box');
    const pipes   = document.querySelectorAll('.opt-pipe');
    optBox.classList.remove('deploy', 'retract'); optBox.classList.add('hidden-initially');
    optArea.classList.remove('reveal'); optArea.classList.add('hidden-initially');
    pipes.forEach(p => { p.classList.remove('extend', 'retract'); p.classList.add('hidden-initially'); });

    setTimeout(() => {
      pipes.forEach(p => { p.classList.remove('hidden-initially'); void p.offsetWidth; p.classList.add('extend'); });
      setTimeout(() => {
        sfxDeploy();
        optBox.classList.remove('hidden-initially'); void optBox.offsetWidth; optBox.classList.add('deploy');
      }, 560);
      setTimeout(() => {
        optArea.classList.remove('hidden-initially'); void optArea.offsetWidth; optArea.classList.add('reveal');
        sfxPop(700);
        setTimeout(() => optArea.classList.remove('reveal'), 1400);
      }, 560 + 1400);
    }, 1150);   /* wait for the blast doors to open before deploying the options */
  }

  function handleAnswer(val) {
    if (phase !== 'question' && phase !== 'hint') return;
    if (timer) clearTimeout(timer);
    hideNudge();   /* the hand disappears the moment the player taps */

    const cfg     = ROWS_CONFIG[currentRow];
    const correct = getCorrect(cfg, grid[currentRow].length);

    if (val === correct) {
      if (currentRow === 0 && val === 5) { sfxSwitch5.currentTime = 0; sfxSwitch5.play().catch(() => {}); }
      if (currentRow === 0 && val === 3) { sfxSwitch3.currentTime = 0; sfxSwitch3.play().catch(() => {}); }
      if (currentRow === 1 && val === 4) { sfxSwitch4.currentTime = 0; sfxSwitch4.play().catch(() => {}); }
      if (currentRow === 1 && val === 7) { sfxSwitch7.currentTime = 0; sfxSwitch7.play().catch(() => {}); }
      if (currentRow === 2 && val === 7)  { sfxSwitch7.currentTime = 0;  sfxSwitch7.play().catch(() => {}); }
      if (currentRow === 2 && val === 10) { sfxSwitch10.currentTime = 0; sfxSwitch10.play().catch(() => {}); }
      if (currentRow === 3 && val === 11) { sfxSwitch11.currentTime = 0; sfxSwitch11.play().catch(() => {}); }
      if (currentRow === 3 && val === 13) { sfxSwitch13.currentTime = 0; sfxSwitch13.play().catch(() => {}); }
      const pts   = showHint ? 5 : wrongCount === 0 ? 15 : 10;
      wrongCount  = 0; wrongAnswer = null; showHint = false;
      streak++; score += pts;
      grid[currentRow] = [...grid[currentRow], val];

      const _userPos = getUserPositions(cfg);
      if (grid[currentRow].length >= (_userPos ? _userPos.length : TOTAL)) {
        _setOptionsLock(true);
        sfxCorrect();
        phase = 'question';
        justPlaced = true; renderQuestion(); justPlaced = false;
        sfxRowComplete();
        setTimeout(sfxCurrentFlow, 230);   /* electric surge as the current flows (after the correct chime) */
        fireConfetti();                    /* themed energy-burst confetti to celebrate the fixed pattern */

        /* the option placeholder retracts back up into the panel */
        const _ob = document.getElementById('options-box');
        _ob.classList.remove('deploy'); void _ob.offsetWidth; _ob.classList.add('retract');
        document.querySelectorAll('.opt-pipe').forEach(p => { p.classList.remove('extend'); p.classList.add('retract'); });

        /* Byte dances in the top-left to celebrate */
        document.getElementById('qrobot').style.opacity = '0';
        document.getElementById('byte-dance').classList.add('show');

        const isLast = currentRow + 1 >= ROWS_CONFIG.length;
        const advance = () => {
          timer = setTimeout(() => {
            if (isLast) {
              playTransition(() => { showScreen('complete'); playEndVideo(); });
            } else {
              /* blast-door transition, then the next level loads in place (only options animate) */
              playTransition(() => { currentRow++; loadLevelInPlace(); });
            }
          }, 700);
        };

        if (currentRow === 0) {
          queueBotText('Well done! The switches are fixed.');
          queueBotText('Now, it is your turn to help!', null, advance);
        } else {
          const winLines = [
            'Good job! You fixed these switches.',
            'Wuhoo! The switches are fixed.',
            'Well done! All the switches are fixed.'
          ];
          queueBotText(winLines[Math.floor(Math.random() * winLines.length)], null, advance);
        }
      } else {
        sfxCorrect();
        phase = 'question';
        justPlaced = true; renderQuestion(); justPlaced = false;
        /* instruction is spoken only once at the start — just re-point the hand at the next option */
        if (currentRow === 0) setTimeout(maybeShowNudge, 450);
      }
    } else {
      /* wrong: gentle SFX + sparks/shake/amber glow on the tapped OPTION only —
         no spoken instruction, and nothing shown on the switch row / vent circuit */
      sfxWrong();
      wrongAnswer = val; streak = 0; wrongCount++;
      phase = 'wrong-second';
      renderQuestion();
      spawnSparks(document.querySelector('#options-area .sw.wrong-option .tile'));
      const revealHint = wrongCount >= 2;   /* checklist: a hint after two consecutive wrongs (visual glow) */
      timer = setTimeout(() => {
        wrongAnswer = null; phase = 'question';
        if (revealHint) showHint = true;
        renderQuestion();
        if (currentRow === 0) maybeShowNudge();   /* re-point the tutorial hand */
      }, 850);
    }
  }

  /* ── Confetti: a themed burst of glowing energy shards, sparks & bolts ── */
  let _confettiRAF = null;
  let _confettiLast = 0;
  const CONFETTI_COLORS = ['#0ce4f9', '#7ff6ff', '#c9f9fe', '#5dff9b', '#23e070', '#ffffff'];

  function _rrect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  /* a little filled lightning bolt centred on (0,0), height ~s */
  function _bolt(ctx, s) {
    const p = [[0.18, -0.5], [-0.28, 0.08], [-0.02, 0.08], [-0.18, 0.5], [0.30, -0.10], [0.04, -0.10]];
    ctx.beginPath();
    ctx.moveTo(p[0][0] * s, p[0][1] * s);
    for (let i = 1; i < p.length; i++) ctx.lineTo(p[i][0] * s, p[i][1] * s);
    ctx.closePath();
    ctx.fill();
  }

  function fireConfetti() {
    const canvas = document.getElementById('fx-confetti');
    if (!canvas || !canvas.getContext) return;
    const ctx = canvas.getContext('2d');
    const W = 1920, H = 1080;
    if (canvas.width !== W) { canvas.width = W; canvas.height = H; }
    const parts = [];
    const rand = (a, b) => a + Math.random() * (b - a);
    const pick = arr => arr[Math.floor(Math.random() * arr.length)];

    function emit(x, y, n, angle, spread, sMin, sMax) {
      for (let i = 0; i < n; i++) {
        const ang = angle + rand(-spread / 2, spread / 2);
        const sp = rand(sMin, sMax);
        const r = Math.random();
        const shape = r < 0.18 ? 'bolt' : r < 0.40 ? 'spark' : 'shard';
        parts.push({
          x, y,
          vx: Math.cos(ang) * sp,
          vy: Math.sin(ang) * sp,
          g: rand(0.30, 0.46),
          drag: rand(0.984, 0.992),
          col: pick(CONFETTI_COLORS),
          shape,
          len: shape === 'shard' ? rand(16, 32) : shape === 'bolt' ? rand(20, 34) : rand(3, 6),
          w: rand(5, 9),
          rot: rand(0, Math.PI * 2),
          vr: rand(-0.34, 0.34),
          life: 0, max: rand(95, 150),
          flutter: rand(0.03, 0.07),
          phase: rand(0, Math.PI * 2),
        });
      }
    }

    /* burst out of the power button (the energy that just switched on) … */
    emit(1786, 121, 70, Math.PI / 2, Math.PI * 1.7, 9, 22);
    /* … plus two side cannons firing up & inward for a celebratory fill */
    emit(150, 1080, 80, -Math.PI / 2 + 0.42, 0.7, 27, 41);
    emit(1770, 1080, 80, -Math.PI / 2 - 0.42, 0.7, 27, 41);
    /* a softer secondary pop from the panel a moment later */
    setTimeout(() => { if (_confettiRAF) emit(859, 360, 50, -Math.PI / 2, Math.PI * 1.2, 12, 26); }, 260);

    function draw(p, alpha) {
      ctx.save();
      ctx.globalAlpha = Math.max(0, alpha);
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.shadowColor = p.col;
      ctx.shadowBlur = 14;
      ctx.fillStyle = p.col;
      if (p.shape === 'shard') {
        _rrect(ctx, -p.w / 2, -p.len / 2, p.w, p.len, p.w / 2);
        ctx.fill();
      } else if (p.shape === 'spark') {
        ctx.beginPath();
        ctx.arc(0, 0, p.len, 0, Math.PI * 2);
        ctx.fill();
      } else {
        _bolt(ctx, p.len);
      }
      ctx.restore();
    }

    if (_confettiRAF) cancelAnimationFrame(_confettiRAF);
    _confettiLast = 0;
    function frame(now) {
      const dt = _confettiLast ? Math.min(2.2, (now - _confettiLast) / 16.67) : 1;
      _confettiLast = now;
      ctx.clearRect(0, 0, W, H);
      let alive = 0;
      for (const p of parts) {
        if (p.life >= p.max) continue;
        alive++;
        p.life += dt;
        p.vy += p.g * dt;
        const d = Math.pow(p.drag, dt);
        p.vx *= d; p.vy *= d;
        p.x += (p.vx + Math.sin(p.phase + p.life * p.flutter) * 1.3) * dt;
        p.y += p.vy * dt;
        p.rot += p.vr * dt;
        const t = p.life / p.max;
        const alpha = t < 0.72 ? 1 : 1 - (t - 0.72) / 0.28;
        draw(p, alpha);
      }
      if (alive > 0) {
        _confettiRAF = requestAnimationFrame(frame);
      } else {
        ctx.clearRect(0, 0, W, H);
        _confettiRAF = null;
      }
    }
    _confettiRAF = requestAnimationFrame(frame);
  }

  function stopConfetti() {
    if (_confettiRAF) { cancelAnimationFrame(_confettiRAF); _confettiRAF = null; }
    const canvas = document.getElementById('fx-confetti');
    if (canvas && canvas.getContext) canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  }

  /* final screen: play the end video, then redirect to the title (with a Play Again button) */
  function playEndVideo() {
    const v = document.getElementById('end-video');
    if (!v) { finishToTitle(); return; }
    try { duckBgm(true); } catch (e) {}   /* lower the music so the video's audio leads */
    try { v.currentTime = 0; } catch (e) {}
    v.onended = finishToTitle;
    const p = v.play();
    if (p && p.catch) p.catch(finishToTitle);   /* if autoplay is blocked, go to the title anyway */
  }

  /* end video finished → blast-door back to the title, now showing the Play Again button */
  function finishToTitle() {
    const v = document.getElementById('end-video');
    if (v) v.onended = null;   /* guard against a double fire */
    playTransition(() => {
      if (v) { try { v.pause(); } catch (e) {} }
      /* swap the same title button into "Play Again" — keeps its pulse / glow / click-sparks */
      const img = document.querySelector('#btn-play img');
      if (img) { img.src = 'assets/play again.svg'; img.alt = 'Play Again'; }
      const btn = document.getElementById('btn-play');
      if (btn) btn.setAttribute('aria-label', 'Play Again');
      phase = 'intro';
      showScreen('intro');
      _starting = false;   /* allow Play Again to fire */
    });
  }

  /* ── Boot: preload every asset behind the loading screen, then start ── */
  const PRELOAD_ASSETS = [
    'assets/title screen.webp',
    'assets/play button.svg',
    'assets/play again.svg',
    'assets/nudge.webp',
    'assets/robot dance.gif',
    'assets/Red button.webp',
    'assets/Green button.webp',
    'assets/background.webp',
    'assets/figma/robot.webp',
    'assets/figma/textbox.svg',
    'assets/figma/panel.svg',
    'assets/figma/panel-green.svg',
    'assets/figma/options-box.svg',
    'assets/figma/connector.webp',
    'assets/figma/tile.webp',
  ];

  function preloadAssets(onProgress) {
    let loaded = 0;
    const total = PRELOAD_ASSETS.length || 1;
    return Promise.all(PRELOAD_ASSETS.map(src => new Promise(resolve => {
      const img = new Image();
      img.onload = img.onerror = () => { loaded++; if (onProgress) onProgress(loaded / total); resolve(); };
      img.src = src;
    })));
  }

  let _booted = false;
  /* Smooth GSAP attention effects for the title-screen PLAY button */
  function animatePlayButton() {
    if (!window.gsap) return;
    const btn = document.querySelector('.btn-play');
    if (!btn || btn._gsapInit) return;
    btn._gsapInit = true;
    const img = btn.querySelector('img');
    if (!img) return;

    const DEPTH = 'drop-shadow(0 7px 14px rgba(0,16,32,0.55))';
    const PERIOD = 1.35;   /* faster shared rhythm → a stronger, livelier pulse */

    /* pronounced breathing pulse */
    gsap.to(img, {
      scale: 1.09, duration: PERIOD, repeat: -1, yoyo: true,
      ease: 'sine.inOut', transformOrigin: '50% 50%'
    });

    /* shaped neon glow that hugs the octagon (drop-shadow on the SVG), pulsing in sync */
    const g = { blur: 14, a: 0.5 };
    const paint = () => {
      img.style.filter = 'drop-shadow(0 0 ' + g.blur.toFixed(1) + 'px rgba(12,228,249,' +
                         g.a.toFixed(3) + ')) ' + DEPTH;
    };
    paint();
    gsap.to(g, {
      blur: 44, a: 0.98, duration: PERIOD, repeat: -1, yoyo: true,
      ease: 'sine.inOut', onUpdate: paint
    });

    /* smooth hover / press — all eased through GSAP */
    const to = (s, d, ease) => gsap.to(btn, { scale: s, duration: d, ease: ease, overwrite: 'auto' });
    btn.addEventListener('mouseenter',  () => to(1.07, 0.35, 'power3.out'));
    btn.addEventListener('mouseleave',  () => to(1.00, 0.55, 'power3.out'));
    btn.addEventListener('mousedown',   () => to(0.94, 0.12, 'power2.out'));
    btn.addEventListener('mouseup',     () => to(1.07, 0.30, 'power2.out'));
    btn.addEventListener('touchstart',  () => to(0.94, 0.12, 'power2.out'), { passive: true });
    btn.addEventListener('touchend',    () => to(1.00, 0.40, 'power2.out'));
  }

  function startGame() {
    if (_booted) return;
    _booted = true;
    const loader = document.getElementById('loader');
    if (loader) loader.classList.add('hidden');
    initGrid();
    showScreen('intro');
    animatePlayButton();
  }

  initGrid();   /* set up game state immediately (cheap) */
  const _fill = document.getElementById('loader-fill');
  const _fontsReady = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();
  Promise.race([
    Promise.all([
      preloadAssets(p => { if (_fill) _fill.style.width = Math.round(p * 100) + '%'; }),
      _fontsReady,
    ]),
    new Promise(resolve => setTimeout(resolve, 12000)),   /* safety: never hang past 12s */
  ]).then(startGame);
</script>
</body>
</html>
